<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>SRbot</title>
    <!-- Core -->
    <link rel="stylesheet" href="/static/css/core/variables.css" />
    <link rel="stylesheet" href="/static/css/core/base.css" />

    <!-- Layouts -->
    <link rel="stylesheet" href="/static/css/layouts/screens.css" />
    <link rel="stylesheet" href="/static/css/layouts/nav.css" />
    <link rel="stylesheet" href="/static/css/layouts/overlays.css" />

    <!-- Components -->
    <link rel="stylesheet" href="/static/css/components/cards.css" />
    <link rel="stylesheet" href="/static/css/components/buttons.css" />
    <link rel="stylesheet" href="/static/css/components/practice.css" />
    <link rel="stylesheet" href="/static/css/components/lists.css" />
    <link rel="stylesheet" href="/static/css/components/forms.css" />
    <link rel="stylesheet" href="/static/css/components/feedback.css" />

    <!-- Utilities & Animations -->
    <link rel="stylesheet" href="/static/css/core/animations.css" />
    <link rel="stylesheet" href="/static/css/utilities/utils.css" />
  </head>
  <body>
    <!-- SVG Sprite: Icons (loaded via fetch) -->
    <div id="svg-container" style="display: none"></div>
    <script>
      fetch("/static/assets/icons/sprite.svg")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("svg-container").innerHTML = data;
        });
    </script>

    <div id="toast" class="toast"></div>

    <!-- Screen: Home -->
    <div id="screen-home" class="screen active loading">
      <div class="header">
        <div class="header-title">Home</div>
      </div>

      <div class="stats-grid">
        <div class="stat-pill">
          <div class="stat-pill-left">
            <div class="skeleton skeleton-val"></div>
            <div class="stat-val" id="stat-due">0</div>
            <div class="stat-pill-label">REVIEW</div>
          </div>
          <div class="skeleton skeleton-val skeleton-icon"></div>
          <div class="stat-pill-icon stat-pill-icon-review">
            <svg class="u-svg-md"><use href="#icon-review"></use></svg>
          </div>
        </div>
        <div class="stat-pill">
          <div class="stat-pill-left">
            <div class="skeleton skeleton-val"></div>
            <div class="stat-val" id="stat-new">0</div>
            <div class="stat-pill-label">NEW</div>
          </div>
          <div class="skeleton skeleton-val skeleton-icon"></div>
          <div class="stat-pill-icon stat-pill-icon-new">
            <svg class="u-svg-md"><use href="#icon-new"></use></svg>
          </div>
        </div>
      </div>

      <div>
        <div class="skeleton skeleton-bar-h30"></div>
        <div class="progress-legend">
          <div class="progress-legend-item" onclick="showQueue()">
            <b class="progress-legend-num text-new" id="count-new">0</b>
            <span class="progress-legend-lbl">QUEUE</span>
          </div>
          <div class="progress-legend-item" onclick="showLearning()">
            <b class="progress-legend-num text-learning" id="count-learning"
              >0</b
            >
            <span class="progress-legend-lbl">LEARNING</span>
          </div>
          <div class="progress-legend-item" onclick="showKnown()">
            <b class="progress-legend-num text-known" id="count-known">0</b>
            <span class="progress-legend-lbl">KNOWN</span>
          </div>
          <div class="progress-legend-item" onclick="showMastered()">
            <b class="progress-legend-num text-mastered" id="count-mastered"
              >0</b
            >
            <span class="progress-legend-lbl">MASTERED</span>
          </div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-pill" onclick="showTodayLearned()">
          <div class="stat-pill-left">
            <div class="skeleton skeleton-val"></div>
            <div class="stat-val" id="stat-today-reviewed">0</div>
            <div class="stat-pill-label">LEARNED</div>
          </div>
          <div class="skeleton skeleton-val skeleton-icon"></div>
          <div class="stat-pill-icon stat-pill-icon-learned">
            <svg class="u-svg-md"><use href="#icon-learned"></use></svg>
          </div>
        </div>
        <div class="stat-pill" onclick="showTodayAdded()">
          <div class="stat-pill-left">
            <div class="skeleton skeleton-val"></div>
            <div class="stat-val" id="stat-today-added">0</div>
            <div class="stat-pill-label">ADDED</div>
          </div>
          <div class="skeleton skeleton-val skeleton-icon"></div>
          <div class="stat-pill-icon stat-pill-icon-added">
            <svg class="u-svg-md"><use href="#icon-add"></use></svg>
          </div>
        </div>
      </div>

      <button id="btn-practice" class="btn" onclick="startPractice()">
        Practice
      </button>
    </div>

    <!-- Screen: Practice -->
    <div id="screen-practice" class="screen">
      <div class="practice-screen-content">
        <div class="practice-info-row">
          <div
            class="practice-badge practice-badge-info"
            id="practice-progress"
          >
            0 / 0
          </div>
        </div>

        <div class="word-card-container">
          <div id="word-card" class="word-card">
            <div class="word-face word-front">
              <div class="practice-badge" id="practice-type"></div>
              <div class="word-main" id="word-front"></div>
            </div>
            <div class="word-face word-back">
              <div class="word-level-badge" id="word-back-level"></div>
              <div class="word-trans" id="word-translation"></div>
              <div class="word-example" id="word-ex"></div>
            </div>
          </div>
        </div>

        <div class="practice-footer">
          <div class="practice-footer-row">
            <button class="btn-round" onclick="exitPractice()">
              <svg class="u-svg-md"><use href="#icon-close"></use></svg>
            </button>
            <button id="btn-undo" class="btn-round" onclick="undo()">
              <svg class="u-svg-md"><use href="#icon-undo"></use></svg>
            </button>
            <button class="btn-round" onclick="playAudio(event)">
              <svg class="u-svg-md"><use href="#icon-audio"></use></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Screen: Dictionary -->
    <div id="screen-search" class="screen">
      <div class="header">
        <div class="header-title">Dictionary</div>
      </div>
      <div class="search-wrapper">
        <input
          type="text"
          id="search-input"
          class="form-input"
          placeholder="Search words..."
          oninput="onSearchInput(this.value)"
        />
        <button
          class="search-clear u-hidden"
          id="search-clear"
          onclick="clearSearch()"
        >
          <svg class="u-svg-lg"><use href="#icon-close"></use></svg>
        </button>
      </div>
      <div
        id="search-actions"
        class="card settings-row search-actions-plate u-hidden"
      >
        <div class="search-actions-btns">
          <button
            id="btn-select-mode"
            class="btn btn-sm btn-secondary"
            onclick="toggleSelectMode()"
          >
            Select
          </button>
          <button
            id="btn-bulk-delete"
            class="btn btn-sm btn-danger u-hidden"
            onclick="executeBulkDelete()"
          >
            Delete
          </button>
        </div>
      </div>
      <div id="search-results"></div>
    </div>

    <!-- Screen: Settings -->
    <div id="screen-settings" class="screen">
      <div class="header">
        <div class="header-title">Settings</div>
      </div>

      <!-- Group 1: Content -->
      <div class="settings-row" onclick="openPicker('language')">
        <div class="settings-row-left">
          <div class="settings-icon settings-icon-lang">
            <svg class="u-svg-md"><use href="#icon-globe"></use></svg>
          </div>
          <div class="settings-label">Dictionary</div>
        </div>
        <div class="picker-value" id="language-display">—</div>
      </div>

      <div class="settings-row" onclick="openPicker('daily_limit')">
        <div class="settings-row-left">
          <div class="settings-icon settings-icon-limit">
            <svg class="u-svg-md"><use href="#icon-new"></use></svg>
          </div>
          <div class="settings-label">Daily Goal</div>
        </div>
        <div class="picker-value" id="set-limit-val">—</div>
      </div>

      <div class="settings-row" onclick="openPicker('practice_mode')">
        <div class="settings-row-left">
          <div class="settings-icon settings-icon-mode">
            <svg class="u-svg-md"><use href="#icon-play"></use></svg>
          </div>
          <div class="settings-label">Direction</div>
        </div>
        <div class="picker-value" id="practice-mode-display">—</div>
      </div>

      <!-- Group 2: Alerts -->
      <div
        class="settings-row"
        onclick="openPicker('notification_interval_minutes')"
      >
        <div class="settings-row-left">
          <div class="settings-icon settings-icon-notify">
            <svg class="u-svg-md"><use href="#icon-bell"></use></svg>
          </div>
          <div class="settings-label">Frequency</div>
        </div>
        <div class="picker-value" id="set-notify-interval">—</div>
      </div>

      <div class="settings-row" onclick="openQuietHoursSheet()">
        <div class="settings-row-left">
          <div class="settings-icon settings-icon-quiet">
            <svg class="u-svg-md"><use href="#icon-moon"></use></svg>
          </div>
          <div class="settings-label">Sleep Schedule</div>
        </div>
        <div class="picker-value" id="quiet-hours-display">—</div>
      </div>
      <input type="hidden" id="set-quiet-start" value="23:00" />
      <input type="hidden" id="set-quiet-end" value="08:00" />

      <!-- Group 3: Tools -->
      <div class="settings-row" onclick="openApiAccessSheet()">
        <div class="settings-row-left">
          <div class="settings-icon settings-icon-api">
            <svg class="u-svg-md"><use href="#icon-key"></use></svg>
          </div>
          <div class="settings-label">API</div>
        </div>
        <div class="picker-trigger-arrow">›</div>
      </div>

      <div class="settings-row-split">
        <div
          class="settings-row"
          onclick="document.getElementById('csv-input').click()"
        >
          <div class="settings-row-left">
            <div class="settings-icon settings-icon-api">
              <svg class="u-svg-md"><use href="#icon-upload"></use></svg>
            </div>
            <div class="settings-label">Import</div>
          </div>
        </div>
        <div class="settings-row" onclick="shareWords()">
          <div class="settings-row-left">
            <div class="settings-icon settings-icon-export">
              <svg class="u-svg-md"><use href="#icon-export"></use></svg>
            </div>
            <div class="settings-label">Export</div>
          </div>
        </div>
      </div>

      <input
        type="file"
        id="csv-input"
        accept=".csv"
        style="display: none"
        onchange="handleFileUpload(this)"
      />
    </div>

    <!-- API Access Sheet -->
    <div
      id="api-overlay"
      class="edit-overlay"
      onclick="closeApiAccessSheet()"
    ></div>
    <div id="api-sheet" class="edit-sheet">
      <div class="edit-sheet-title"></div>
      <div class="sheet-text">Use this token to connect external apps.</div>
      <div class="card settings-group card-sm u-mb24">
        <div id="api-token-display" class="token-box">—</div>
      </div>
      <button class="btn" onclick="copyToken()">Copy Token</button>
      <button class="btn btn-secondary btn-revoke" onclick="revokeToken()">
        Revoke
      </button>
      <button class="btn btn-secondary u-mt8" onclick="closeApiAccessSheet()">
        Close
      </button>
    </div>

    <!-- Quiet Hours Sheet -->
    <div
      id="quiet-hours-overlay"
      class="edit-overlay"
      onclick="closeQuietHoursSheet()"
    ></div>
    <div id="quiet-hours-sheet" class="edit-sheet">
      <div class="edit-sheet-title"></div>
      <div class="picker-double">
        <div class="picker-column">
          <div class="picker-column-title">Starts at</div>
          <div id="quiet-start-list" class="picker-list-mini"></div>
        </div>
        <div class="picker-column">
          <div class="picker-column-title">Ends at</div>
          <div id="quiet-end-list" class="picker-list-mini"></div>
        </div>
      </div>
      <button class="btn" onclick="saveQuietHours()">Save Range</button>
      <button class="btn btn-secondary" onclick="closeQuietHoursSheet()">
        Cancel
      </button>
    </div>

    <!-- Nav -->
    <div class="nav">
      <button id="nav-home" class="nav-btn active" onclick="showScreen('home')">
        <svg class="u-svg-lg"><use href="#icon-home"></use></svg>
      </button>
      <button id="nav-search" class="nav-btn" onclick="showScreen('search')">
        <svg class="u-svg-lg"><use href="#icon-search"></use></svg>
      </button>
      <button
        id="nav-settings"
        class="nav-btn"
        onclick="showScreen('settings')"
      >
        <svg class="u-svg-lg"><use href="#icon-settings"></use></svg>
      </button>
    </div>

    <!-- Edit Sheet -->
    <div id="edit-overlay" class="edit-overlay" onclick="closeEdit()"></div>
    <div id="edit-sheet" class="edit-sheet" style="padding-bottom: 80px">
      <div class="edit-sheet-title">Edit Word</div>
      <div class="card settings-group">
        <div class="add-form">
          <input
            type="text"
            id="edit-word"
            class="form-input"
            placeholder="Word"
          />
          <input
            type="text"
            id="edit-translation"
            class="form-input"
            placeholder="Translate"
          />
          <input
            type="text"
            id="edit-example"
            class="form-input"
            placeholder="Example"
          />
          <div
            id="edit-level-trigger"
            class="form-input picker-trigger"
            onclick="openPicker('level', 'edit')"
          >
            <span id="edit-level-display" class="picker-trigger-placeholder"
              >Level</span
            >
            <span class="picker-trigger-arrow">›</span>
          </div>
          <input type="hidden" id="edit-level" value="" />
        </div>
      </div>
      <div class="settings-row-split u-mt24">
        <button class="btn btn-secondary" onclick="closeEdit()">Cancel</button>
        <button id="edit-save-btn" class="btn" onclick="saveEdit()">
          Save
        </button>
      </div>

      <div class="u-mt40"></div>
    </div>

    <!-- Universal Picker Sheet -->
    <div id="picker-overlay" class="edit-overlay" onclick="closePicker()"></div>
    <div id="picker-sheet" class="edit-sheet">
      <div class="edit-sheet-title" id="picker-title">Select</div>
      <div id="picker-list" class="picker-list"></div>
    </div>

    <canvas id="confetti-canvas" class="confetti-canvas"></canvas>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/static/js/app.js"></script>
  </body>
</html>
