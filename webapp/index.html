<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SRbot</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

  <div id="toast" class="toast"></div>

  <!-- Screen: Home -->
  <div id="screen-home" class="screen active">
    <div class="header">
      <div class="header-title">Overview</div>
    </div>

    <div class="stats-grid">
      <div class="stat-pill">
        <div class="stat-pill-left">
          <div class="stat-val" id="stat-due">0</div>
          <div class="stat-label" id="label-due">Review</div>
        </div>
        <div class="stat-pill-icon stat-pill-icon-review">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
        </div>
      </div>
      <div class="stat-pill">
        <div class="stat-pill-left">
          <div class="stat-val" id="stat-new">0</div>
          <div class="stat-label" id="label-new">New</div>
        </div>
        <div class="stat-pill-icon stat-pill-icon-new">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="progress-total">TOTAL <span id="count-total">0</span></div>
      <div class="progress-bar">
        <div class="progress-bar-seg" id="bar-new"></div>
        <div class="progress-bar-seg" id="bar-learning"></div>
        <div class="progress-bar-seg" id="bar-known"></div>
        <div class="progress-bar-seg" id="bar-mastered"></div>
      </div>
      <div class="progress-legend">
        <div class="progress-legend-item">
          <b class="progress-legend-num text-new" id="count-new">0</b>
          <span class="progress-legend-lbl">QUEUE</span>
        </div>
        <div class="progress-legend-item">
          <b class="progress-legend-num text-learning" id="count-learning">0</b>
          <span class="progress-legend-lbl">LEARNING</span>
        </div>
        <div class="progress-legend-item">
          <b class="progress-legend-num text-known" id="count-known">0</b>
          <span class="progress-legend-lbl">KNOWN</span>
        </div>
        <div class="progress-legend-item">
          <b class="progress-legend-num text-mastered" id="count-mastered">0</b>
          <span class="progress-legend-lbl">MASTERED</span>
        </div>
      </div>
      <div class="card-sep"></div>
      <div class="week-grid" id="week-grid"></div>
    </div>

    <button id="btn-practice" class="btn" onclick="startPractice()">Practice</button>
  </div>

  <!-- Screen: Practice -->
  <div id="screen-practice" class="screen">
    <div class="practice-screen-content">
      
      <div class="practice-info-row">
        <div class="practice-badge practice-badge-info" id="practice-progress">0 / 0</div>
      </div>

      <div class="word-card-container">
        <div id="word-card" class="word-card">
          <div class="word-face word-front">
            <div class="practice-badge" id="practice-type"></div>
            <div class="word-main" id="word-front"></div>
          </div>
          <div class="word-face word-back">
            <div class="word-level-badge" id="word-back-level"></div>
            <div class="word-trans" id="word-translation"></div>
            <div class="word-example" id="word-ex"></div>
          </div>
        </div>
      </div>

      <div class="practice-footer">
        <div class="practice-footer-row">
          <button class="btn-round" onclick="exitPractice()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <button id="btn-undo" class="btn-round" onclick="undo()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
          </button>
          <button class="btn-round" onclick="playAudio(event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Screen: Add -->
  <div id="screen-add" class="screen">
    <div class="header">
      <div class="header-title">Add Word</div>
    </div>
    <div class="card settings-group">
      <div class="add-form">
        <input type="text" id="add-word" class="form-input" placeholder="Word">
        <input type="text" id="add-translation" class="form-input" placeholder="Translate">
        <input type="text" id="add-example" class="form-input" placeholder="Example">
        <div id="add-level-trigger" class="form-input picker-trigger" onclick="openPicker('level', 'add')">
          <span id="add-level-display" class="picker-trigger-placeholder">Level</span>
          <span class="picker-trigger-arrow">›</span>
        </div>
        <input type="hidden" id="add-level" value="">
      </div>
    </div>
    <button class="btn" onclick="submitWords()">Add</button>
    
    <div class="capsule-wrapper">
      <label class="capsule" for="file-input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload CSV
      </label>
    </div>
    <input type="file" id="file-input" accept=".csv,.txt" onchange="handleFileUpload(this)">
  </div>

  <!-- Screen: Search -->
  <div id="screen-search" class="screen">
    <div class="header">
      <div class="header-title">Dictionary</div>
    </div>
    <div class="search-wrapper">
      <input type="text" id="search-input" class="form-input" placeholder="Search words..." oninput="onSearchInput(this.value)">
      <button class="search-clear" id="search-clear" onclick="clearSearch()" style="display:none">✕</button>
    </div>
    <div id="search-results"></div>
  </div>

  <!-- Screen: Settings -->
  <div id="screen-settings" class="screen">
    <div class="header">
      <div class="header-title">Settings</div>
    </div>

    <div class="card settings-group">
      <!-- Section: Dictionary -->
      <div class="settings-row" onclick="openPicker('language')">
        <div class="settings-label">Active Dictionary</div>
        <div class="picker-value" id="language-display">—</div>
      </div>

      <div class="settings-row" onclick="openPicker('practice_mode')">
        <div class="settings-label">Practice Mode</div>
        <div class="picker-value" id="practice-mode-display">—</div>
      </div>

      <div class="settings-row" onclick="openPicker('daily_limit')">
        <div class="settings-label">New words limit</div>
        <div class="picker-value" id="set-limit-val">—</div>
      </div>

      <!-- Section: Reminders -->
      <div class="settings-row" onclick="openPicker('notification_interval_minutes')">
        <div class="settings-label">Frequency</div>
        <div class="picker-value" id="set-notify-interval">—</div>
      </div>

      <div class="settings-row" onclick="openPicker('quiet_hours')">
        <div class="settings-label">Quiet hours</div>
        <div class="picker-value" id="quiet-hours-display">—</div>
      </div>
      <input type="hidden" id="set-quiet-start" value="23:00">
      <input type="hidden" id="set-quiet-end" value="08:00">
    </div>

    <div class="capsule-wrapper">
      <div class="capsule" onclick="shareWords()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export dictionary
      </div>
      <div class="capsule capsule-danger" onclick="clearAllWords()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4h6v2"></path></svg>
        Clear all words
      </div>
    </div>


  </div>

  <!-- Nav -->
  <div class="nav">
    <button id="nav-home" class="nav-btn active" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </button>
    <button id="nav-add" class="nav-btn" onclick="showScreen('add')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
    </button>
    <button id="nav-search" class="nav-btn" onclick="showScreen('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </button>
    <button id="nav-settings" class="nav-btn" onclick="showScreen('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>

  <!-- Edit Sheet -->
  <div id="edit-overlay" class="edit-overlay" onclick="closeEdit()"></div>
  <div id="edit-sheet" class="edit-sheet">
    <div class="edit-sheet-title">Edit Word</div>
    <div class="card settings-group">
      <div class="add-form">
        <input type="text" id="edit-word" class="form-input" placeholder="Word">
        <input type="text" id="edit-translation" class="form-input" placeholder="Translate">
        <input type="text" id="edit-example" class="form-input" placeholder="Example">
        <div id="edit-level-trigger" class="form-input picker-trigger" onclick="openPicker('level', 'edit')">
            <span id="edit-level-display" class="picker-trigger-placeholder">Level</span>
            <span class="picker-trigger-arrow">›</span>
        </div>
        <input type="hidden" id="edit-level" value="">
      </div>
    </div>
    <button id="edit-save-btn" class="btn" onclick="saveEdit()">Save</button>
    <button class="btn btn-secondary" onclick="closeEdit()">Cancel</button>
  </div>

  <!-- Universal Picker Sheet -->
  <div id="picker-overlay" class="edit-overlay" onclick="closePicker()"></div>
  <div id="picker-sheet" class="edit-sheet">
    <div class="edit-sheet-title" id="picker-title">Select</div>
    <div id="picker-list" class="picker-list"></div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script type="module" src="static/js/app.js"></script>
</body>
</html>
